trigger:
- main

pool:
  vmImage: windows-latest

variables:
  sourceFolder: 'files'
  storageAccountName: 'myblobstoragemanju9676'
  containerName: 'samplefiles'

steps:

- checkout: self

- script: |
    echo "Build.SourcesDirectory=$(Build.SourcesDirectory)"
    dir "$(Build.SourcesDirectory)"
    dir "$(Build.SourcesDirectory)\$(sourceFolder)"
  displayName: 'Verify source files'

- task: AzureCLI@2
  displayName: 'Upload files to Blob Storage'
  inputs:
    azureSubscription: 'Azure subscription 1(ddc45bc2-7a34-4943-8d1b-4aa187194509)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      SOURCE_DIR="$(Build.SourcesDirectory)/$(sourceFolder)"

      echo "Source directory: $SOURCE_DIR"

      if [ ! -d "$SOURCE_DIR" ]; then
        echo "Directory does not exist: $SOURCE_DIR"
        pwd
        ls -la
        exit 1
      fi

      ls -la "$SOURCE_DIR"

      az storage blob upload-batch \
        --account-name "$(storageAccountName)" \
        --destination "$(containerName)" \
        --source "$SOURCE_DIR" \
        --auth-mode login